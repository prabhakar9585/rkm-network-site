<!DOCTYPE html>
<html>
<head>
<title>Pending Faults</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Pending Faults</h1>
</header>

<div id="faultList" class="container"></div>

<script type="module">

import { db } from "./firebase-init.js";

import {
collection,
getDocs,
query,
orderBy,
doc,
deleteDoc,
addDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const list = document.getElementById("faultList");

async function loadFaults() {

list.innerHTML = "";

const q = query(
collection(db,"faults"),
orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

snapshot.forEach((docSnap)=>{

const data = docSnap.data();
const id = docSnap.id;

const date = data.createdAt?.toDate().toLocaleString() || "-";

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<p><strong>Landline:</strong> ${data.landline}</p>
<p><strong>Name:</strong> ${data.name}</p>
<p><strong>Fault:</strong> ${data.fault}</p>
<p><strong>Location:</strong> ${data.location}</p>
<p><strong>Booked:</strong> ${date}</p>
<button class="btn" onclick="resolveFault('${id}')">Resolve</button>
`;

list.appendChild(card);

});

}

window.resolveFault = async function(id){

const reason = prompt("Enter Resolution Reason:");

if(!reason) return;

const snapshot = await getDocs(collection(db,"faults"));
const singleDoc = snapshot.docs.find(d => d.id === id);

if(!singleDoc){
alert("Fault not found");
return;
}

const data = singleDoc.data();

await addDoc(collection(db,"resolvedFaults"),{
...data,
solution:reason,
resolvedAt:new Date()
});

await deleteDoc(doc(db,"faults",id));

alert("Moved to Resolved");

loadFaults();

};

loadFaults();

</script>

</body>
</html>
